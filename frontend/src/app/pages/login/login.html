<div class="min-h-screen bg-slate-900 grid place-items-center px-4">

  <form class="bg-slate-800 rounded-2xl shadow-2xl text-sm text-slate-300 border border-slate-700 p-8 py-10 w-full max-w-sm">

    <!-- Icono usuario animado -->
    <div class="flex justify-center mb-4">
      <div class="icon-wrapper">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="80" height="80">
          <circle class="glow" cx="50" cy="50" r="46" />
          <circle class="circle-outer" cx="50" cy="50" r="46" />
          <circle class="head" cx="50" cy="35" r="14" />
          <path class="body" d="M15 85 Q15 58 50 58 Q85 58 85 85 Z" />
        </svg>
      </div>
    </div>

    <!-- Título -->
    <p class="text-xl font-semibold text-center text-white mb-6">
      <span class="text-blue-400">Rovimatica</span> PaqTracer
    </p>

    <!-- Email -->
    <div class="mt-2">
      <label class="block text-slate-400 mb-1">Email</label>
      <input type="email" #correoInput placeholder="correo@empresa.com" required
        (input)="correo = correoInput.value"
        class="border border-slate-600 bg-slate-700 text-white rounded-lg w-full p-2 outline-blue-400 placeholder-slate-500 focus:border-blue-400 transition-colors" />
    </div>

    <!-- Contraseña -->
    <div class="mt-4">
      <label class="block text-slate-400 mb-1">Contraseña</label>
      <input type="password" #passInput placeholder="••••••••" required
        (input)="contrasena = passInput.value"
        class="border border-slate-600 bg-slate-700 text-white rounded-lg w-full p-2 outline-blue-400 placeholder-slate-500 focus:border-blue-400 transition-colors" />
    </div>

    <!-- Botón -->
    <button type="button" (click)="comprobarUser()"
      [disabled]="cargando()"
      class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-white w-full py-2.5 rounded-lg mt-6 cursor-pointer font-medium tracking-wide">
      {{ cargando() ? 'Cargando...' : 'Iniciar sesión' }}
    </button>

    <!-- Error -->
    @if (error()) {
      <p class="mt-3 text-red-400 text-xs text-center">{{ error() }}</p>
    }

  </form>

</div>
