<div class="min-h-screen bg-slate-950 grid place-items-center px-4 relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-indigo-600/8 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600/20 border border-blue-500/30 mb-4">
        <svg class="w-7 h-7 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">
        <span class="text-blue-400">Rovimatica</span> PaqTracer
      </h1>
      <p class="text-slate-500 text-sm mt-1">Sistema de seguimiento de paquetes</p>
    </div>

    <div class="bg-slate-900/80 border border-slate-700/60 rounded-2xl p-8 shadow-2xl">
      <div class="mb-4">
        <label class="block text-xs font-medium text-slate-400 mb-2 uppercase tracking-wide">{{ 'login.correo' | translate }}</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <input type="email" #correoInput placeholder="correo@empresa.com" required autocomplete="email"
            (input)="correo = correoInput.value"
            class="w-full bg-slate-800 border border-slate-700 text-white text-sm rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 placeholder:text-slate-600 transition-all"/>
        </div>
      </div>
      <div class="mb-6">
        <label class="block text-xs font-medium text-slate-400 mb-2 uppercase tracking-wide">{{ 'login.contrasena' | translate }}</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" #passInput placeholder="••••••••" required autocomplete="current-password"
            (input)="contrasena = passInput.value"
            class="w-full bg-slate-800 border border-slate-700 text-white text-sm rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 placeholder:text-slate-600 transition-all"/>
        </div>
      </div>
      <button type="button" (click)="comprobarUser()" [disabled]="cargando()"
        class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium text-sm py-3 rounded-xl transition-all flex items-center justify-center gap-2">
        @if (cargando()) {
          <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
        }
        {{ cargando() ? ('login.cargando' | translate) : ('login.boton' | translate) }}
      </button>
      @if (error()) {
        <div class="mt-4 flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 text-xs px-4 py-3 rounded-xl">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          {{ 'login.error' | translate }}
        </div>
      }
    </div>
    <p class="text-center text-slate-700 text-xs mt-6">PaqTracker v2.0 · Rovimatica</p>
  </div>
</div>
